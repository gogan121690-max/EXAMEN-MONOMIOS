<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>Operaciones con Monomios</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0d0f1a;--surface:#151724;--surface2:#1e2235;--border:#2a2f4a;
  --accent:#7c6af5;--accent2:#4fd1c5;--accent3:#f6ad55;
  --text:#e8eaf6;--muted:#7b82a8;
  --success:#4fd1c5;--error:#fc8181;--warning:#f6ad55;
  --radius:12px;--radius-sm:8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-user-select:none;user-select:none;}
input{-webkit-user-select:text!important;user-select:text!important;}
body{
  font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  padding:2rem 1rem;
  background-image:radial-gradient(ellipse at 20% 20%,rgba(124,106,245,0.08) 0%,transparent 60%),
                   radial-gradient(ellipse at 80% 80%,rgba(79,209,197,0.06) 0%,transparent 60%);
}
h1{font-weight:700;font-size:1.9rem;letter-spacing:-0.5px;margin-bottom:0.2rem;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.subtitle{color:var(--muted);font-size:0.85rem;margin-bottom:1.75rem;text-align:center}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:1.6rem;width:100%;max-width:560px;animation:fadeIn 0.3s ease;position:relative;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.card h2{font-size:1.15rem;font-weight:600;margin-bottom:1.4rem}
label{display:block;font-size:0.76rem;color:var(--muted);margin-bottom:0.35rem;letter-spacing:0.5px;text-transform:uppercase}
input[type=text],input[type=password]{width:100%;background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:0.7rem 1rem;color:var(--text);
  font-family:'Outfit',sans-serif;font-size:1rem;margin-bottom:0.9rem;
  transition:border-color 0.2s;outline:none;}
input[type=text]:focus,input[type=password]:focus{border-color:var(--accent)}
.btn{display:inline-block;padding:0.7rem 1.4rem;border-radius:var(--radius-sm);border:none;
  font-family:'Outfit',sans-serif;font-size:0.93rem;font-weight:600;cursor:pointer;transition:all 0.15s;}
.btn-primary{background:var(--accent);color:#fff;width:100%}
.btn-primary:hover{background:#6a58e0}
.btn-check{background:var(--accent2);color:#0d0f1a;width:100%}
.btn-check:hover{background:#38b2ac}
.btn-next{background:var(--accent);color:#fff;width:100%}
.btn-final{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;width:100%;font-size:1rem;padding:0.85rem}
.level-dots{display:flex;gap:6px;margin-bottom:1.4rem;align-items:center;flex-wrap:wrap}
.dot{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:0.75rem;font-weight:600;border:1px solid var(--border);color:var(--muted);background:var(--surface2);transition:all 0.3s;}
.dot.active{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 0 10px rgba(124,106,245,0.4)}
.dot.done{background:var(--success);color:#0d0f1a;border-color:var(--success)}
.level-name{font-size:0.8rem;color:var(--muted);margin-left:6px}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;margin-bottom:1.4rem;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px;transition:width 0.4s ease}
.score-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem}
.q-counter{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:3px 11px;font-size:0.8rem;color:var(--muted)}
.type-tag{display:inline-block;padding:3px 11px;border-radius:20px;font-size:0.73rem;font-weight:600;letter-spacing:0.4px}
.tag-suma{background:rgba(79,209,197,0.12);color:var(--accent2);border:1px solid rgba(79,209,197,0.3)}
.tag-resta{background:rgba(252,129,129,0.12);color:var(--error);border:1px solid rgba(252,129,129,0.3)}
.tag-mult{background:rgba(124,106,245,0.15);color:var(--accent);border:1px solid rgba(124,106,245,0.3)}
.tag-div{background:rgba(246,173,85,0.12);color:var(--warning);border:1px solid rgba(246,173,85,0.3)}
.expr-box{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:1.1rem 1rem;text-align:center;margin-bottom:1.1rem;
  font-family:'Space Mono',monospace;font-size:1.35rem;color:var(--text);
  min-height:68px;display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:4px;}
.fraction{display:inline-flex;flex-direction:column;align-items:center;vertical-align:middle;margin:0 5px}
.frac-num{border-bottom:2px solid var(--text);padding-bottom:2px}
.frac-den{padding-top:2px}

/* ── campo de respuesta con preview de superíndices ── */
.ans-wrap{position:relative;margin-bottom:8px}
.ans-hidden{position:absolute;opacity:0;width:100%;height:100%;top:0;left:0;font-size:16px;
  -webkit-user-select:text!important;user-select:text!important;}
.ans-preview{
  background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--radius-sm);
  padding:0.7rem 1rem;min-height:50px;font-family:'Space Mono',monospace;
  font-size:1.2rem;color:var(--text);display:flex;align-items:center;
  flex-wrap:wrap;cursor:text;transition:border-color 0.2s;
}
.ans-preview.focused{border-color:var(--accent)}
.ans-preview .ph{color:var(--muted);font-size:0.82rem;font-family:'Outfit',sans-serif}
.cursor-blink{display:inline-block;width:2px;height:1em;background:var(--accent);margin-left:1px;vertical-align:text-bottom;animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.ans-locked{
  background:var(--surface2);border:1.5px solid var(--border);
  border-radius:var(--radius-sm);padding:0.7rem 1rem;
  font-family:'Space Mono',monospace;font-size:1.15rem;color:var(--muted);
  min-height:50px;display:flex;align-items:center;
}
.ans-hint{font-size:0.72rem;color:var(--muted);margin-top:3px}

.msg{padding:8px 13px;border-radius:var(--radius-sm);font-size:0.85rem;margin:0.65rem 0;display:flex;align-items:center;gap:7px}
.msg-warn{background:rgba(246,173,85,0.12);color:var(--warning);border:1px solid rgba(246,173,85,0.25)}
.star-btn{position:absolute;top:1rem;right:1rem;width:30px;height:30px;border-radius:50%;border:none;
  background:rgba(246,173,85,0.12);cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:15px;transition:all 0.18s;padding:0;}
.star-btn:hover{background:rgba(246,173,85,0.28);transform:scale(1.15) rotate(20deg);}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.65);display:flex;align-items:center;justify-content:center;z-index:100;padding:1rem;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.4rem;width:100%;max-width:340px;}
.modal h3{font-size:1rem;font-weight:600;margin-bottom:0.35rem}
.modal p{font-size:0.8rem;color:var(--muted);margin-bottom:1.1rem}
.level-list{display:flex;flex-direction:column;gap:7px;margin-bottom:1.1rem}
.lvl-row{display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface2);cursor:pointer;transition:all 0.15s;}
.lvl-row:hover{border-color:var(--accent)}
.lvl-row.selected{border-color:var(--accent);background:rgba(124,106,245,0.12)}
.lvl-num{width:26px;height:26px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:0.75rem;font-weight:700;flex-shrink:0;}
.lvl-num.free{background:var(--success);color:#0d0f1a}
.lvl-info{flex:1}.lvl-name{font-size:0.85rem;font-weight:500}.lvl-tag{font-size:0.7rem;color:var(--muted)}
.pin-wrap{margin-bottom:0.9rem}
.pin-wrap label{font-size:0.73rem;color:var(--muted);margin-bottom:0.3rem;text-transform:uppercase;letter-spacing:0.4px;display:block}
.pin-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:0.55rem 0.85rem;color:var(--text);font-family:'Space Mono',monospace;font-size:1rem;
  letter-spacing:3px;outline:none;transition:border-color 0.2s;
  -webkit-user-select:text!important;user-select:text!important;}
.pin-input:focus{border-color:var(--accent)}
.modal-btns{display:flex;gap:7px}
.btn-modal-ok{flex:1;background:var(--accent);color:#fff;padding:0.6rem;border:none;border-radius:var(--radius-sm);font-family:'Outfit',sans-serif;font-size:0.88rem;font-weight:600;cursor:pointer;}
.btn-modal-cancel{padding:0.6rem 0.9rem;background:var(--surface2);color:var(--muted);border:1px solid var(--border);border-radius:var(--radius-sm);font-family:'Outfit',sans-serif;font-size:0.88rem;cursor:pointer;}
.final-hero{text-align:center;margin-bottom:1.5rem}
.final-hero .emo{font-size:2.8rem;display:block;margin-bottom:0.65rem}
.final-hero h2{font-size:1.5rem;font-weight:700;margin-bottom:0.2rem}
.final-hero p{color:var(--muted);font-size:0.88rem}
.total-score{display:flex;gap:10px;justify-content:center;margin-bottom:1.4rem;flex-wrap:wrap}
.big-stat{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:0.9rem 1.1rem;text-align:center;flex:1;min-width:90px}
.big-stat .n{font-size:1.7rem;font-weight:700;color:var(--accent);display:block}
.big-stat .l{font-size:0.72rem;color:var(--muted)}
.levels-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:1.4rem}
.level-stat{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px 6px;text-align:center}
.level-stat .sn{font-size:1rem;font-weight:700;display:block;margin-bottom:2px}
.level-stat .sl{font-size:0.65rem;color:var(--muted)}
.pass{color:var(--success)}.fail{color:var(--error)}
.final-msg{text-align:center;font-size:0.85rem;color:var(--muted);margin-bottom:1.4rem;padding:0.9rem;background:var(--surface2);border-radius:var(--radius-sm);border:1px solid var(--border)}
.teacher-tap{position:fixed;bottom:0;right:0;width:52px;height:52px;opacity:0;cursor:pointer;z-index:50;}
.block-screen{position:fixed;inset:0;background:#080a12;z-index:9999;
  display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;text-align:center;}
.block-screen .bi{font-size:4rem;margin-bottom:1rem}
.block-screen h2{font-size:1.5rem;font-weight:700;color:var(--error);margin-bottom:0.75rem}
.block-screen p{color:var(--muted);font-size:0.88rem;max-width:320px;line-height:1.6}
.block-screen .code{margin-top:1.5rem;background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:0.75rem 1.5rem;
  font-family:'Space Mono',monospace;font-size:0.85rem;color:var(--warning);letter-spacing:1px;}
.unblock-wrap{margin-top:1.25rem;display:flex;flex-direction:column;align-items:center;gap:8px;width:100%;max-width:280px}
.unblock-wrap input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:0.6rem 1rem;color:var(--text);font-family:'Space Mono',monospace;font-size:1rem;
  letter-spacing:2px;outline:none;text-align:center;
  -webkit-user-select:text!important;user-select:text!important;}
.unblock-wrap input:focus{border-color:var(--accent)}
.unblock-wrap button{width:100%;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);
  padding:0.6rem 1.1rem;font-family:'Outfit',sans-serif;font-size:0.9rem;font-weight:600;cursor:pointer;}
</style>
</head>
<body>
<h1>Operaciones con Monomios</h1>
<p class="subtitle">Suma · Resta · Multiplicación · División<br>3 niveles · 8 ejercicios cada uno</p>
<div class="card" id="card"></div>

<script>
/* ══════════════════════════════════
   BLOQUEO PERMANENTE
══════════════════════════════════ */
const BLOCK_KEY='monomios_blocked', WARN_KEY='monomios_warnings', BID_KEY='monomios_bid';
const MAX_WARN=2, MASTER_PWD='profe2025';

function getWarnings(){return parseInt(localStorage.getItem(WARN_KEY)||'0',10);}
function addWarning(){const w=getWarnings()+1;localStorage.setItem(WARN_KEY,w);return w;}
function isBlocked(){return localStorage.getItem(BLOCK_KEY)==='1';}
function setBlocked(){localStorage.setItem(BLOCK_KEY,'1');}
function getBID(){let b=localStorage.getItem(BID_KEY);if(!b){b=Date.now().toString(36).toUpperCase();localStorage.setItem(BID_KEY,b);}return b;}

function showBlockScreen(){
  document.body.innerHTML='';
  const bl=document.createElement('div');
  bl.className='block-screen';
  bl.innerHTML=
    '<div class="bi">🔒</div>'+
    '<h2>Acceso bloqueado</h2>'+
    '<p>Se detectaron múltiples intentos de abandonar el examen.<br><br>'+
    'Esta página ha sido bloqueada permanentemente en este dispositivo.<br><br>'+
    'Comunícate con tu profesor para desbloquearla.</p>'+
    '<div class="code">Código: '+getBID()+'</div>'+
    '<div class="teacher-tap" onclick="showUnlockForm(this.parentNode)"></div>';
  document.body.appendChild(bl);
  document.addEventListener('contextmenu',e=>e.preventDefault());
}

function showUnlockForm(parent){
  if(document.getElementById('unlock-wrap')) return;
  const w=document.createElement('div');
  w.className='unblock-wrap'; w.id='unlock-wrap';
  w.innerHTML=
    '<input type="password" id="pwd-inp" placeholder="Contraseña del profesor" autocomplete="off"/>'+
    '<button onclick="tryUnlock()">Desbloquear</button>'+
    '<div id="pwd-err" style="font-size:0.76rem;color:#fc8181;min-height:16px"></div>';
  parent.appendChild(w);
  document.getElementById('pwd-inp').focus();
}

function tryUnlock(){
  const val=(document.getElementById('pwd-inp').value||'').trim();
  if(val===MASTER_PWD){
    localStorage.removeItem(BLOCK_KEY);
    localStorage.removeItem(WARN_KEY);
    localStorage.removeItem('monomios_seed');
    location.reload();
  } else {
    document.getElementById('pwd-err').textContent='Contraseña incorrecta.';
    document.getElementById('pwd-inp').value='';
  }
}

if(isBlocked()) showBlockScreen();

/* ══════════════════════════════════
   ANTI-TRAMPA
══════════════════════════════════ */
let warnOverlayActive=false;
function triggerWarning(reason){
  if(isBlocked()) return;
  const w=addWarning();
  if(w>=MAX_WARN){setBlocked();showBlockScreen();return;}
  if(warnOverlayActive) return;
  warnOverlayActive=true;
  const rem=MAX_WARN-w;
  const ov=document.createElement('div');
  ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:9000;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;text-align:center;';
  ov.innerHTML=
    '<div style="font-size:3rem;margin-bottom:1rem">⚠️</div>'+
    '<h2 style="color:#fc8181;font-size:1.3rem;font-weight:700;margin-bottom:0.6rem">¡Actividad detectada!</h2>'+
    '<p style="color:#7b82a8;font-size:0.86rem;max-width:300px;line-height:1.6">'+reason+'</p>'+
    '<p style="color:#fc8181;font-size:0.82rem;margin-top:0.75rem;font-weight:600">Advertencia '+w+' de '+MAX_WARN+'.'+
    (rem===1?' La próxima vez la página quedará bloqueada permanentemente.':'')+
    '</p>'+
    '<button onclick="this.parentNode.remove();warnOverlayActive=false;" style="margin-top:1.4rem;background:#7c6af5;color:#fff;border:none;padding:0.7rem 2rem;border-radius:8px;font-family:Outfit,sans-serif;font-size:0.92rem;font-weight:600;cursor:pointer;">Volver al examen</button>';
  document.body.appendChild(ov);
}
document.addEventListener('contextmenu',e=>e.preventDefault());
document.addEventListener('keydown',e=>{
  if((e.metaKey||e.ctrlKey)&&['c','x','a','p','s'].includes(e.key.toLowerCase())){e.preventDefault();if(['p','s'].includes(e.key.toLowerCase()))triggerWarning('Atajo de teclado no permitido.');}
  if(e.key==='PrintScreen'){e.preventDefault();triggerWarning('Intento de captura de pantalla.');}
});
document.addEventListener('copy',e=>{if(e.target.tagName!=='INPUT'){e.preventDefault();triggerWarning('Intento de copiar contenido del examen.');}});
document.addEventListener('selectstart',e=>{if(e.target.tagName!=='INPUT')e.preventDefault();});

/* ── Detección extendida para móviles y pantalla dividida ── */
/* 1) Cambio de pestaña / app */
document.addEventListener('visibilitychange',()=>{
  if(document.hidden&&state==='game')triggerWarning('Se detectó un cambio de pantalla o aplicación durante el examen.');
});
/* 2) La ventana pierde el foco (otra app encima, ventana flotante, notificación interactiva) */
window.addEventListener('blur',()=>{
  if(state==='game')triggerWarning('La ventana del examen perdió el foco. No salgas del examen ni abras otra aplicación.');
});
/* 3) Detección de pantalla dividida o ventana flotante en móvil:
   guardamos el tamaño inicial y detectamos reducciones significativas */
let initialWidth=0, initialHeight=0, initialRatio=0, sizeBaseline=false;
function setSizeBaseline(){
  initialWidth=window.innerWidth;
  initialHeight=window.innerHeight;
  initialRatio=initialWidth/initialHeight;
  sizeBaseline=true;
}
window.addEventListener('resize',()=>{
  if(state!=='game'||!sizeBaseline) return;
  const w=window.innerWidth, h=window.innerHeight;
  const widthShrunk = w < initialWidth*0.80;
  const heightShrunk = h < initialHeight*0.80;
  const newRatio = w/h;
  if((widthShrunk||heightShrunk) && Math.abs(newRatio-initialRatio)>0.15){
    triggerWarning('Se detectó pantalla dividida o ventana flotante. Usa el examen en pantalla completa.');
    setTimeout(setSizeBaseline,1500);
  } else if(widthShrunk||heightShrunk){
    triggerWarning('Se detectó un cambio de tamaño de la ventana. Usa el examen en pantalla completa.');
    setTimeout(setSizeBaseline,1500);
  }
});
function tryEstablishBaseline(){
  if(state==='game' && !sizeBaseline){
    setTimeout(()=>{ if(state==='game') setSizeBaseline(); }, 800);
  }
}

/* ══════════════════════════════════
   DATOS DEL JUEGO
   
   CALIFICACIÓN: 3 puntos totales repartidos
   entre 24 preguntas (si inicia nivel 1).
   Cada acierto = 3/24 = 0.125 pts
   Por nivel (8 preguntas): max 1 pto por nivel
   Si inicia en nivel N, solo se reparte entre
   las preguntas jugadas.
══════════════════════════════════ */
const PLAYER={name:'',apellidos:'',grupo:'',startLevel:0};
/* SCORES[i] = número de aciertos en nivel i (0-8) */
const SCORES=[0,0,0];
let currentLevel=0,currentQ=0,answered=false,state='login';
let rawText='',isFocused=false;

const LEVEL_KEYS=['','2m','3m'];
const LEVEL_NAMES=['Nivel 1 — Fácil','Nivel 2 — Medio','Nivel 3 — Difícil'];
const TYPE_LABELS={suma:'SUMA',resta:'RESTA',mult:'MULTIPLICACIÓN',div:'DIVISIÓN'};
const TYPE_CSS={suma:'tag-suma',resta:'tag-resta',mult:'tag-mult',div:'tag-div'};

/* Valor de cada acierto según cuántos niveles se juegan */
function ptsPerHit(nivelesJugados){
  /* 3 puntos entre (nivelesJugados * 8) preguntas */
  return 3 / (nivelesJugados * 8);
}

function fr(n,d){return '<span class="fraction"><span class="frac-num">'+n+'</span><span class="frac-den">'+d+'</span></span>';}

const QUESTIONS=[
/* NV1 FÁCIL */
{type:'suma', html:'3x + 5x',                  ans:'8x'},
{type:'suma', html:'2a² + 4a²',                ans:'6a2'},
{type:'resta',html:'9y − 4y',                  ans:'5y'},
{type:'resta',html:'7b³ − 3b³',                ans:'4b3'},
{type:'mult', html:'2x · 3x',                  ans:'6x2'},
{type:'mult', html:'4a · 2a',                  ans:'8a2'},
{type:'div',  html:fr('10x²','5x'),            ans:'2x'},
{type:'div',  html:fr('12a³','4a'),            ans:'3a2'},
/* NV2 MEDIO */
{type:'suma', html:'5x²y + 3x²y',             ans:'8x2y'},
{type:'suma', html:'−2ab + 7ab',               ans:'5ab'},
{type:'resta',html:'8m²n − 5m²n',             ans:'3m2n'},
{type:'resta',html:'−3x²y − (−8x²y)',         ans:'5x2y'},
{type:'mult', html:'3x²y · 2xy²',             ans:'6x3y3'},
{type:'mult', html:'−4ab · 3a²b',             ans:'-12a3b2'},
{type:'div',  html:fr('15x³y²','3xy'),         ans:'5x2y'},
{type:'div',  html:fr('−24a²b³','6ab²'),       ans:'-4ab'},
/* NV3 DIFÍCIL */
{type:'suma', html:'3a²bc + 5a²bc − 2a²bc',   ans:'6a2bc'},
{type:'suma', html:'−4x²y + 9x²y − 3x²y',     ans:'2x2y'},
{type:'resta',html:'(6a²b − 2a²b) − 3a²b',   ans:'a2b'},
{type:'resta',html:'5x²yz − 8x²yz + x²yz',    ans:'-2x2yz'},
{type:'mult', html:'(−2x²y)(3xy²)(−z)',        ans:'6x3y3z'},
{type:'mult', html:'(4a²b)(−2ab²c)',           ans:'-8a3b3c'},
{type:'div',  html:fr('−36x⁴y³z²','9x²y²z'),  ans:'-4x2yz'},
{type:'div',  html:fr('(−3a²b)³','−9a⁴b²'),   ans:'3a2b'},
];

/* ══════════════════════════════════
   ALEATORIZACIÓN POR DISPOSITIVO
   Cada dispositivo recibe un orden único de ejercicios DENTRO de cada nivel,
   generado a partir de una semilla guardada en localStorage.
   Si el alumno recarga, el orden se mantiene.
══════════════════════════════════ */
const SEED_KEY='monomios_seed';
function getSeed(){
  let s=localStorage.getItem(SEED_KEY);
  if(!s){
    s=(Date.now()*Math.random()).toString(36)+Math.random().toString(36).slice(2);
    localStorage.setItem(SEED_KEY,s);
  }
  let h=2166136261;
  for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619);}
  return h>>>0;
}
function mulberry32(seed){
  return function(){
    seed|=0;seed=seed+0x6D2B79F5|0;
    let t=Math.imul(seed^seed>>>15,1|seed);
    t=t+Math.imul(t^t>>>7,61|t)^t;
    return ((t^t>>>14)>>>0)/4294967296;
  };
}
function shuffle(arr,rng){
  const a=arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(rng()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}
/* Mezclamos los 8 ejercicios DENTRO de cada nivel, manteniendo niveles separados */
function buildExam(){
  const rng=mulberry32(getSeed());
  const exam=[];
  for(let lvl=0;lvl<3;lvl++){
    const block=QUESTIONS.slice(lvl*8,(lvl+1)*8);
    const shuffled=shuffle(block,rng);
    exam.push(...shuffled);
  }
  return exam;
}
const EXAM=buildExam();

/* ── superíndices ── */
const SUP_CHARS={'2':'²','3':'³','4':'⁴','5':'⁵','6':'⁶','7':'⁷','8':'⁸','9':'⁹'};
const SUP_BACK={'²':'2','³':'3','⁴':'4','⁵':'5','⁶':'6','⁷':'7','⁸':'8','⁹':'9'};

function rawToHTML(raw,cur){
  if(!raw) return cur?'<span class="cursor-blink"></span>':'<span class="ph">Escribe tu respuesta…</span>';
  let h='';
  for(let i=0;i<raw.length;i++){
    const c=raw[i],p=raw[i-1]||'';
    const aL=/[a-zA-Z]/.test(p)||isSup(p);
    if(/[0-9]/.test(c)&&aL) h+='<sup style="font-size:0.62em;vertical-align:super">'+c+'</sup>';
    else if(isSup(c)) h+='<sup style="font-size:0.62em;vertical-align:super">'+SUP_BACK[c]+'</sup>';
    else h+=c==='−'?'−':c.replace(/&/g,'&amp;');
  }
  if(cur) h+='<span class="cursor-blink"></span>';
  return h;
}
function isSup(c){return Object.prototype.hasOwnProperty.call(SUP_BACK,c);}

function norm(s){
  let r=s.toLowerCase().replace(/\s/g,'');
  for(const[k,v] of Object.entries(SUP_BACK)) r=r.replaceAll(k,v);
  return r.replace(/−/g,'-').replace(/[^a-z0-9\-]/g,'');
}
function checkAns(raw,correct){return norm(raw)===norm(correct);}

function syncH(){const e=document.getElementById('ans-hidden');if(e)e.value=rawText;}
function refreshP(){const e=document.getElementById('ans-preview');if(e)e.innerHTML=rawToHTML(rawText,!answered&&isFocused);}

/* ── modal nivel ── */
let modalSel=0;
function openLevelModal(){
  let rows='';
  for(let i=0;i<3;i++){
    const free=i===0;
    rows+='<div class="lvl-row" id="lvlrow-'+i+'" onclick="selectLvl('+i+')">'+
      '<div class="lvl-num '+(free?'free':'')+'">'+(i+1)+'</div>'+
      '<div class="lvl-info"><div class="lvl-name">'+LEVEL_NAMES[i]+'</div>'+
      '<div class="lvl-tag">'+(free?'Sin clave':'Clave requerida')+'</div></div>'+
      (free?'<span style="font-size:11px;color:var(--success)">✓</span>':'<span>🔒</span>')+
    '</div>';
  }
  const m=document.createElement('div');
  m.className='modal-overlay';m.id='lvl-modal';
  m.innerHTML='<div class="modal"><h3>Seleccionar nivel</h3><p>Niveles 2 y 3 requieren clave.</p>'+
    '<div class="level-list">'+rows+'</div>'+
    '<div class="pin-wrap" id="pin-wrap" style="display:none">'+
    '<label>Clave de acceso</label>'+
    '<input type="text" class="pin-input" id="pin-input" maxlength="3" autocomplete="off"/>'+
    '<div id="pin-err" style="font-size:0.76rem;color:var(--error);margin-top:4px;min-height:16px"></div>'+
    '</div>'+
    '<div class="modal-btns">'+
    '<button class="btn-modal-cancel" onclick="closeModal()">Cancelar</button>'+
    '<button class="btn-modal-ok" onclick="confirmLvl()">Entrar</button>'+
    '</div></div>';
  document.body.appendChild(m);
  modalSel=0;hlRow(0);
}
function selectLvl(i){
  modalSel=i;hlRow(i);
  const pw=document.getElementById('pin-wrap'),pi=document.getElementById('pin-input');
  if(i>0){pw.style.display='block';pi.value='';document.getElementById('pin-err').textContent='';pi.focus();}
  else pw.style.display='none';
}
function hlRow(i){for(let j=0;j<3;j++){const r=document.getElementById('lvlrow-'+j);if(r)r.classList.toggle('selected',j===i);}}
function closeModal(){const m=document.getElementById('lvl-modal');if(m)m.remove();}
function confirmLvl(){
  const lvl=modalSel;
  if(lvl>0){
    const pin=(document.getElementById('pin-input').value||'').trim().toLowerCase();
    if(pin!==LEVEL_KEYS[lvl]){document.getElementById('pin-err').textContent='Clave incorrecta.';return;}
  }
  closeModal();
  currentLevel=lvl;currentQ=0;answered=false;rawText='';isFocused=false;
  for(let i=0;i<lvl;i++) SCORES[i]=0;
  SCORES[lvl]=0;for(let i=lvl+1;i<3;i++) SCORES[i]=0;
  updateStartInfo();
}

/* ── RENDER ── */
const card=document.getElementById('card');
function render(){
  if(isBlocked()) return;
  if(state==='login') renderLogin();
  else if(state==='game') renderGame();
  else renderFinal();
}

function renderLogin(){
  card.innerHTML=
    '<button class="star-btn" onclick="openLevelModal()" title="Seleccionar nivel">⭐</button>'+
    '<h2>Registro del jugador</h2>'+
    '<label>Nombre(s)</label><input type="text" id="inp-name" placeholder="Tu nombre"/>'+
    '<label>Apellidos</label><input type="text" id="inp-ap" placeholder="Tus apellidos"/>'+
    '<label>Grupo</label><input type="text" id="inp-grp" placeholder="Ej: 2A"/>'+
    '<div id="start-info" style="font-size:0.78rem;color:var(--accent2);margin-bottom:0.7rem;min-height:18px"></div>'+
    '<div id="lerr"></div>'+
    '<button class="btn btn-primary" style="margin-top:0.2rem" onclick="startGame()">Comenzar ▶</button>';
  document.getElementById('inp-name').focus();
  updateStartInfo();
}
function updateStartInfo(){
  const el=document.getElementById('start-info');
  if(el) el.textContent=currentLevel>0?'Iniciando en: '+LEVEL_NAMES[currentLevel]:'';
}
function startGame(){
  const n=document.getElementById('inp-name').value.trim();
  const a=document.getElementById('inp-ap').value.trim();
  const g=document.getElementById('inp-grp').value.trim();
  if(!n||!a||!g){document.getElementById('lerr').innerHTML='<div class="msg msg-warn">⚠ Completa todos los campos.</div>';return;}
  PLAYER.name=n;PLAYER.apellidos=a;PLAYER.grupo=g;PLAYER.startLevel=currentLevel;
  state='game';render();
  tryEstablishBaseline();
}

function renderGame(){
  const q=EXAM[currentLevel*8+currentQ];
  const pct=((currentQ+1)/8*100).toFixed(0);
  let dots='';
  for(let i=0;i<3;i++){
    let c='dot';if(i<currentLevel)c+=' done';else if(i===currentLevel)c+=' active';
    dots+='<div class="'+c+'">'+(i<currentLevel?'✓':i+1)+'</div>';
  }
  const tag='<span class="type-tag '+TYPE_CSS[q.type]+'">'+TYPE_LABELS[q.type]+'</span>';

  let botBtn='';
  if(!answered){
    botBtn='<button class="btn btn-check" onclick="submitAns()">Confirmar →</button>';
  } else if(currentQ<7){
    botBtn='<button class="btn btn-next" onclick="nextQ()">Siguiente →</button>';
  } else if(currentLevel<2){
    botBtn='<button class="btn btn-next" onclick="nextLevel()">Siguiente nivel →</button>';
  } else {
    botBtn='<button class="btn btn-final" onclick="showFinal()">Finalizar examen 🏆</button>';
  }

  /* campo respuesta: preview con superíndices + input oculto */
  const ansSection = answered
    ? '<div class="ans-locked">'+rawToHTML(rawText,false)+'</div>'+
      '<div style="font-size:0.76rem;color:var(--muted);margin-top:3px;text-align:center">Respuesta registrada ✓</div>'
    : '<div class="ans-wrap">'+
        '<div class="ans-preview" id="ans-preview" onclick="focusInp()">'+
          rawToHTML(rawText,true)+
        '</div>'+
        '<input type="text" id="ans-hidden" class="ans-hidden" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" inputmode="text"/>'+
        '<div class="ans-hint">Toca el cuadro y escribe con tu teclado · los números tras una letra se muestran como exponente</div>'+
      '</div>';

  card.innerHTML=
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.45rem;flex-wrap:wrap;gap:5px">'+
    '<span style="font-size:0.78rem;color:var(--muted)">'+PLAYER.name+' '+PLAYER.apellidos+
    ' · <span style="color:var(--accent)">'+PLAYER.grupo+'</span></span>'+
    '<div class="q-counter">'+LEVEL_NAMES[currentLevel].split('—')[0].trim()+'</div></div>'+
    '<div class="level-dots">'+dots+'<span class="level-name">'+LEVEL_NAMES[currentLevel]+'</span></div>'+
    '<div class="progress-bar"><div class="progress-fill" style="width:'+pct+'%"></div></div>'+
    '<div class="score-row">'+tag+'<span style="font-size:0.8rem;color:var(--muted)">Ejercicio '+(currentQ+1)+' de 8</span></div>'+
    '<div class="expr-box">'+q.html+'</div>'+
    '<label>Tu respuesta</label>'+
    ansSection+
    '<div style="margin-top:0.85rem">'+botBtn+'</div>';

  if(!answered){
    const inp=document.getElementById('ans-hidden');
    inp.addEventListener('input',e=>{rawText=e.target.value;refreshP();});
    inp.addEventListener('focus',()=>{isFocused=true;refreshP();const p=document.getElementById('ans-preview');if(p)p.classList.add('focused');});
    inp.addEventListener('blur',()=>{isFocused=false;refreshP();const p=document.getElementById('ans-preview');if(p)p.classList.remove('focused');});
    inp.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();submitAns();}});
    /* auto-focus para que se abra teclado al tocar preview */
  }
}

function focusInp(){const e=document.getElementById('ans-hidden');if(e)e.focus();}

function submitAns(){
  const inp=document.getElementById('ans-hidden');
  if(inp) rawText=inp.value.trim();
  if(!rawText) return;
  const ok=checkAns(rawText,EXAM[currentLevel*8+currentQ].ans);
  if(ok) SCORES[currentLevel]++;
  answered=true;
  render();
}

function nextQ(){currentQ++;answered=false;rawText='';isFocused=false;render();}
function nextLevel(){currentLevel++;currentQ=0;answered=false;rawText='';isFocused=false;render();}
function showFinal(){state='final';render();}

/* ══════════════════════════════════
   PANTALLA FINAL CON CALIFICACIÓN
   
   3 puntos totales ÷ preguntas jugadas
   Preguntas jugadas = (3 - startLevel) * 8
   Valor por acierto = 3 / preguntasJugadas
   Puntos por nivel  = aciertos_nivel * valorPorAcierto
══════════════════════════════════ */
function renderFinal(){
  const sl=PLAYER.startLevel||0;
  const nivelesJugados=3-sl;
  const preguntasJugadas=nivelesJugados*8;
  const valorAcierto=3/preguntasJugadas;          /* pts por cada acierto correcto */
  const maxPorNivel=8*valorAcierto;               /* máximo de pts por nivel */

  /* aciertos totales solo de los niveles jugados */
  let totalAciertos=0;
  for(let i=sl;i<3;i++) totalAciertos+=SCORES[i];
  const calificacion=(totalAciertos*valorAcierto).toFixed(2);

  /* grid de niveles */
  let lvlH='';
  for(let i=0;i<3;i++){
    const skip=i<sl;
    const ptsnivel=skip?null:(SCORES[i]*valorAcierto);
    const ptsStr=skip?'—':ptsnivel.toFixed(2)+' pts';
    const aciStr=skip?'—':SCORES[i]+'/8';
    const col=skip?'':ptsnivel>=maxPorNivel*0.6?'pass':'fail';
    lvlH+='<div class="level-stat" style="'+(skip?'opacity:0.4':'')+'">'+
      '<span class="sn '+col+'">'+ptsStr+'</span>'+
      '<span class="sl">'+aciStr+' aciertos</span>'+
      '<span class="sl">'+LEVEL_NAMES[i].split('—')[1].trim()+(skip?' ⭐':'')+'</span>'+
    '</div>';
  }

  const startNote=sl>0
    ?'<div style="display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:1rem;font-size:0.8rem;color:var(--warning);background:rgba(246,173,85,0.1);border:1px solid rgba(246,173,85,0.25);border-radius:8px;padding:7px 12px">'+
      '<span>⭐</span> Se inició desde el '+LEVEL_NAMES[sl]+'</div>'
    :'';

  const nota=parseFloat(calificacion);
  const msg=nota>=2.7?'¡Excelente dominio de los monomios! 🌟':nota>=2?'¡Buen trabajo! Sigue practicando. 💪':'Repasa los temas, ¡tú puedes! 📚';

  card.innerHTML=
    '<div class="final-hero"><span class="emo">🏆</span><h2>Examen completado</h2>'+
    '<p>'+PLAYER.name+' '+PLAYER.apellidos+' · Grupo <strong>'+PLAYER.grupo+'</strong></p></div>'+
    startNote+
    '<div class="total-score">'+
    '<div class="big-stat"><span class="n">'+totalAciertos+'/'+preguntasJugadas+'</span><span class="l">Aciertos</span></div>'+
    '<div class="big-stat"><span class="n" style="color:var(--accent2)">'+calificacion+'</span><span class="l">Calificación / 3 pts</span></div>'+
    '<div class="big-stat"><span class="n" style="color:var(--accent3)">'+valorAcierto.toFixed(3)+'</span><span class="l">Pts por acierto</span></div>'+
    '</div>'+
    '<p style="font-size:0.74rem;color:var(--muted);text-align:center;margin-bottom:0.65rem;text-transform:uppercase;letter-spacing:0.4px">Puntos por nivel (máx. '+maxPorNivel.toFixed(2)+' c/u)</p>'+
    '<div class="levels-grid">'+lvlH+'</div>'+
    '<div class="final-msg">'+msg+'</div>'+
    '<div class="teacher-tap" onclick="showTeacherUnlock()"></div>';
}

/* desbloqueo desde pantalla final */
function showTeacherUnlock(){
  if(document.getElementById('teacher-modal')) return;
  const m=document.createElement('div');
  m.className='modal-overlay';m.id='teacher-modal';
  m.innerHTML='<div class="modal">'+
    '<h3>Acceso profesor</h3><p>Contraseña para reiniciar el examen.</p>'+
    '<div class="pin-wrap">'+
    '<label>Contraseña</label>'+
    '<input type="password" class="pin-input" id="tpwd" autocomplete="off"/>'+
    '<div id="tpwd-err" style="font-size:0.76rem;color:var(--error);margin-top:4px;min-height:16px"></div>'+
    '</div>'+
    '<div class="modal-btns">'+
    '<button class="btn-modal-cancel" onclick="document.getElementById(\'teacher-modal\').remove()">Cancelar</button>'+
    '<button class="btn-modal-ok" onclick="confirmTeacher()">Confirmar</button>'+
    '</div></div>';
  document.body.appendChild(m);
  document.getElementById('tpwd').focus();
}
function confirmTeacher(){
  const val=(document.getElementById('tpwd').value||'').trim();
  if(val===MASTER_PWD){
    localStorage.removeItem(BLOCK_KEY);
    localStorage.removeItem(WARN_KEY);
    localStorage.removeItem('monomios_seed');
    document.getElementById('teacher-modal').remove();
    location.reload();
  } else {
    document.getElementById('tpwd-err').textContent='Contraseña incorrecta.';
    document.getElementById('tpwd').value='';
  }
}

render();
</script>
